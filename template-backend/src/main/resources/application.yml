# 开发环境配置
springdoc:
  paths-to-match: /api/**
  swagger-ui:
    operations-sorter: alpha
spring:
  mail:
    host: smtp.163.com
    username: temlate@163.com
    password: temlate
  ai:
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: 'sk-e11e3978692c46a6b67fccac1f449d3b'
      chat:
        enabled: ${DEEPSEEK_ENABLED:false}
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: ${DEEPSEEK_TEMPERATURE:0.2}
          max-tokens: ${DEEPSEEK_MAX_TOKENS:1200}
  rabbitmq:
    addresses: localhost
    username: admin
    password: admin
    virtual-host: /
  datasource:
    url: jdbc:mysql://localhost:3306/consultation
    username: consultation
    password: consultation
    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    jwt:
      key: 'abcdefghijklmn'
      expire: 72
      limit:
        base: 10
        upgrade: 300
        frequency: 30
    filter:
      order: -100
  web:
    verify:
      mail-limit: 60
    flow:
      period: 3
      limit: 50
      block: 30
    cors:
      origin: '*'
      credentials: false
      methods: '*'
  minio:
    endpoint: 'http://localhost:9000'
    username: 'minioadmin'
    password: 'minioadmin'
consultation:
  ai:
    triage:
      enabled: ${CONSULTATION_AI_TRIAGE_ENABLED:true}
      prompt-version: ${CONSULTATION_AI_TRIAGE_PROMPT_VERSION:deepseek-triage-v1}
      doctor-candidate-limit: ${CONSULTATION_AI_TRIAGE_DOCTOR_LIMIT:3}
